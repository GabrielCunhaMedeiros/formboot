<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <div class="container mt-5">
  <h1>Declaração de residência</h1>
  <form class="row g-12">
    <div class="col-md-12">
    <p> Dados Pessoais</p>
    </div>
    <div class="col-md-12">
      <label for="nome" class="form-label">Nome:</label>
      <input type="text" class="form-control" id="nome">
    </div>
    <div class="col-md-12">
      <label for="nomesocial" class="form-label">Nome Social:</label>
      <input type="text" class="form-control" id="nomesocial">
    </div>
    <div class="col-md-8">
      <label for="identidade" class="form-label">Documento de identidade:</label>
      <input type="text" class="form-control" id="identidade">
    </div>
    <div class="col-md-4">
      <label for="orgao" class="form-label">Orgão expedidor:</label>
      <input type="text" class="form-control" id="orgao">
    </div>
    <div class="col-md-12">
      <label for="cpf" class="form-label">CPF:</label>
      <input type="text" class="form-control" id="cpf">
    </div>
    <div class="col-md-8">
      <label for="nacionalidade" class="form-label">Nacionalidade:</label>
      <input type="text" class="form-control" id="nacionalidade">
    </div>
    <div class="col-md-4">
      <label for="naturalidade" class="form-label">Naturalidade:</label>
      <input type="text" class="form-control" id="naturalidade">
    </div>
     <div class="col-md-8">
      <label for="telefone" class="form-label">Telefone:</label>
      <input type="tel" class="form-control" id="telefone">
    </div>
    <div class="col-md-4">
      <label for="celular" class="form-label">Celular:</label>
      <input type="tel" class="form-control" id="celular">
    </div>
    <div class="col-md-12">
      <label for="email" class="form-label">Email:</label>
      <input type="email" class="form-control" id="email">
    </div>
    <div class="col-md-12">
      <p>Na falta de documentos para comprovação de residência, declaro para os devidos fins, sob as penas da Lei, ser residente e domiciliado no endereço abaixo.
    </div>
    <div class="col-md-12">
       <label for="endereco" class="form-label">Endereço:</label>
      <input type="text" class="form-control" id="endereco">
    </div>
    <div class="col-md-3">
       <label for="N" class="form-label">N°:</label>
      <input type="text" class="form-control" id="N">
    </div>
    <div class="col-md-4">
     <label for="complemeto" class="form-label">Complemento:</label>
      <input type="text" class="form-control" id="complemento">
    </div>
     <div class="col-md-5">
       <label for="cep" class="form-label">CEP:</label>
      <input type="text" class="form-control" id="cep">
    </div>
    <div class="col-md-3">
     <label for="uf" class="form-label">UF:</label>
      <input type="text" class="form-control" id="uf">
    </div>
     <div class="col-md-4">
       <label for="cidade" class="form-label">Cidade:</label>
      <input type="text" class="form-control" id="cidade">
    </div>
    <div class="col-md-5">
     <label for="bairro" class="form-label">Bairro:</label>
      <input type="text" class="form-control" id="bairro">
    </div> 
 </div>
</body>
</html>
